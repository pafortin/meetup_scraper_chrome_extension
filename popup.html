<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 240px; padding: 12px; font-family: sans-serif; background: #222; color: white; }
    h3 { margin: 0 0 4px; text-align: center; }
    .hint { margin: 0 0 10px; font-size: 11px; color: #9aa; text-align: center; line-height: 1.4; }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(90deg, #0078ff, #00c4ff);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    #status { margin: 8px 0 0; font-size: 11px; color: #7fd; text-align: center; min-height: 14px; }
  </style>
</head>
<body>
  <h3>Meetup Scraper</h3>
  <p class="hint">Ouvrez la page d'un groupe Meetup, puis lancez. Le CSV se télécharge à la fin.</p>
  <button id="startBtn">Lancer l'extraction</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
